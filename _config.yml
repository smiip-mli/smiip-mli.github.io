# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: "SMIIP Lab" # the website title
first_name: Ming
middle_name: ""
last_name: Li
email: ming.li369@dukekunshan.edu.cn
description: > # the ">" symbol means to ignore newlines until "footer_text:"
  Speech and Multimodal Intelligent Information Processing (SMIIP) Lab at Duke Kunshan University
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: speech processing, multimodal, speaker recognition, diarization, autism, pathological speech, DKU
lang: en
icon: 🔬

url: https://smiip-mli.github.io # the base hostname & protocol for your site
baseurl: "" # the subpath of your site, e.g. /blog/. Leave blank for root
last_updated: true
impressum_path:
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
rss_icon: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
bib_search: true

# Dimensions
max_width: 930px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
serve_og_meta: false
serve_schema_org: false
og_image:

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

acm_id:
blogger_url:
bluesky_url:
dblp_url:
discord_id:
facebook_id:
flickr_id:
github_username: smiip-mli
gitlab_username:
ieee_id:
inspirehep_id:
instagram_id:
kaggle_id:
keybase_username:
lastfm_id:
lattes_id:
linkedin_username:
mastodon_username:
medium_username:
